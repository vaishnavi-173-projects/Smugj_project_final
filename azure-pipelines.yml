trigger:
  - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  # 1. Update these exactly to match the Azure resources created by your Terraform steps
  azureServiceConnection: 'Azure-Service-Connection-2'
  resourceGroupName: 'Smugj_Project_RG'
  acrName: 'smugjacr2026' # Must match your terraform.tfvars value
  vmName: 'smugj-flask-vm'
  imageRepository: 'flask-app'
  containerName: 'flask-app-prod'
  dockerfilePath: '$(Build.SourcesDirectory)/Dockerfile'
  tag: '$(Build.BuildId)'
  # Terraform State Configuration
  tfStateResourceGroup: 'TerraformState_RG'
  tfStateStorageAccount: 'smugjtfstate2026xyz'
  tfStateContainer: 'tfstate'

stages:
  # -------------------------------------------------------------
  # STAGE 1: Provision Infrastructure using Terraform
  # -------------------------------------------------------------
  - stage: Terraform
    displayName: 'Infrastructure: Terraform Plan & Apply'
    jobs:
      - job: TerraformJob
        displayName: 'Deploy Terraform Infrastructure'
        steps:
          - task: AzureCLI@2
            displayName: 'Terraform Init, Validate, Plan, Apply'
            inputs:
              azureSubscription: '$(azureServiceConnection)'
              addSpnToEnvironment: true
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              workingDirectory: '$(System.DefaultWorkingDirectory)'
              inlineScript: |
                set -e # Fail immediately on errors

                # 1. Setup Terraform State Backend in Azure
                echo "[INFO] Creating Storage Account for Terraform State..."
                if ! az group show --name $(tfStateResourceGroup) >/dev/null 2>&1; then
                    az group create --name $(tfStateResourceGroup) --location "southeastasia"
                fi
                
                # We use a static name with a unique identifier to ensure it works across runs
                az storage account create --name $(tfStateStorageAccount) --resource-group $(tfStateResourceGroup) --sku Standard_LRS --encryption-services blob
                az storage container create --name $(tfStateContainer) --account-name $(tfStateStorageAccount)

                # 2. Install Terraform
                echo "[INFO] Installing Terraform..."
                wget -O- https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
                echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list > /dev/null
                sudo apt-get update -y && sudo apt-get install -y terraform

                # 3. Export credentials for Terraform AzureRM Provider
                export ARM_CLIENT_ID=$servicePrincipalId
                export ARM_CLIENT_SECRET=$servicePrincipalKey
                export ARM_TENANT_ID=$tenantId
                export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)

                # 4. Terraform Execution
                echo "[INFO] Running Terraform Init..."
                terraform init -reconfigure \
                  -backend-config="resource_group_name=$(tfStateResourceGroup)" \
                  -backend-config="storage_account_name=$(tfStateStorageAccount)" \
                  -backend-config="container_name=$(tfStateContainer)" \
                  -backend-config="key=terraform.tfstate" || exit 1

                echo "[INFO] Running Terraform Validate..."
                terraform validate || exit 1

                echo "[INFO] Running Terraform Plan..."
                terraform plan -out=tfplan || exit 1

                echo "[INFO] Running Terraform Apply..."
                terraform apply -auto-approve tfplan || exit 1

  # -------------------------------------------------------------
  # STAGE 2: Build and Push Docker Image to Azure Container Registry
  # -------------------------------------------------------------
  - stage: Build
    displayName: 'CI: Build & Push to ACR'
    dependsOn: Terraform
    condition: succeeded()
    jobs:
      - job: BuildAndPush
        displayName: 'Build and Push'
        steps:
          - task: AzureCLI@2
            displayName: 'Docker Login, Build, and Push to ACR'
            inputs:
              azureSubscription: '$(azureServiceConnection)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                set -e # Fail immediately on errors

                # 1. Authenticate to ACR using Azure CLI
                echo "[INFO] Logging into ACR: $(acrName)"
                az acr login --name $(acrName) || exit 1

                # 2. Build the production Docker image
                echo "[INFO] Building Docker Image..."
                docker build -t $(acrName).azurecr.io/$(imageRepository):$(tag) -t $(acrName).azurecr.io/$(imageRepository):latest -f $(dockerfilePath) . || exit 1

                # 3. Push the image to ACR
                echo "[INFO] Pushing Docker Image to ACR..."
                docker push $(acrName).azurecr.io/$(imageRepository):$(tag) || exit 1
                docker push $(acrName).azurecr.io/$(imageRepository):latest || exit 1

  # -------------------------------------------------------------
  # STAGE 3: Deploy Container onto the Virtual Machine
  # -------------------------------------------------------------
  - stage: Deploy
    displayName: 'CD: Deploy to Azure Virtual Machine'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - job: DeployToVM
        displayName: 'Pull and Run Container on VM'
        steps:
          - task: AzureCLI@2
            displayName: 'Deploy Application via Azure CLI Script'
            inputs:
              azureSubscription: '$(azureServiceConnection)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                set -e # Fail immediately on errors

                # 1. Dynamically retrieve the VM's Public IP from Azure to avoid hardcoding
                VM_IP=$(az network public-ip show --resource-group $(resourceGroupName) --name smugj-vm-ip --query ipAddress --output tsv)
                echo "[INFO] Target deployment VM IP is: $VM_IP"

                # 2. Extract ACR credentials so the remote VM can access the private registry images
                ACR_USER=$(az acr credential show --name $(acrName) --query username --output tsv)
                ACR_PASS=$(az acr credential show --name $(acrName) --query passwords[0].value --output tsv)

                # 3. Generate a secure deployment script to run on the VM
                # Using positional parameters avoids shell expansion issues with passwords containing special characters
                cat << 'EOF' > deploy.sh
                #!/bin/bash
                set -e

                ACR_SERVER=$1
                ACR_USERNAME=$2
                ACR_PASSWORD=$3
                CONTAINER_NAME=$4
                IMAGE_REPO=$5

                # Wait for Docker to finish installing from the background custom_data script if needed
                while ! command -v docker &> /dev/null; do
                  echo '[INFO] Waiting for Docker installation engine...'
                  sleep 5
                done

                # Authenticate the local VM's daemon with your private Azure Registry
                sudo docker login $ACR_SERVER -u $ACR_USERNAME -p $ACR_PASSWORD || exit 1

                # Stop and remove any prior running instances to avoid port collision errors
                sudo docker stop $CONTAINER_NAME || true
                sudo docker rm $CONTAINER_NAME || true

                # Pull down the latest fresh image build copy from the cloud registry
                sudo docker pull $ACR_SERVER/$IMAGE_REPO:latest || exit 1

                # Spin up the new application container mapping port 5000 externally
                sudo docker run -d \
                  --name $CONTAINER_NAME \
                  -p 5000:5000 \
                  --restart always \
                  $ACR_SERVER/$IMAGE_REPO:latest || exit 1

                echo '[INFO] Container deployment verified and running!'
                EOF

                # 4. Use the Azure CLI run-command mechanism to safely execute the shell script inside the VM
                echo "[INFO] Executing deployment script on VM..."
                az vm run-command invoke \
                  --resource-group $(resourceGroupName) \
                  --name $(vmName) \
                  --command-id RunShellScript \
                  --scripts @deploy.sh \
                  --parameters "$(acrName).azurecr.io" "$ACR_USER" "$ACR_PASS" "$(containerName)" "$(imageRepository)" || exit 1